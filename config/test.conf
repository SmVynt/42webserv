server {
    listen 8080;
    server_name localhost;

    client_timeout 300;
    client_max_body_size 100;

    # 1. / must answer to GET request ONLY
    location / {
        root YoupiBanane;
        methods GET;
        index youpi.bad_extension;
    }

    # 2. Any file with .bla must call cgi_test executable (POST)
    location .bla {
        root YoupiBanane;
        methods POST;
        cgi_path ./cgi_tester;
        cgi_extension .bla;
        client_max_body_size 10000000000;
    }

    # 3. /post_body must answer to POST with maxBody of 100
    location /post_body {
        root YoupiBanane;
        methods POST;
        client_max_body_size 100;
    }

    # 4. /directory/ -> root YoupiBanane, default file: youpi.bad_extension
    location /directory {
        methods GET;
        root YoupiBanane;
        index youpi.bad_extension;
        autoindex off;
    }
}
