server {
    listen 8080;
    server_name localhost;

    client_max_body_size 1M;

    error_page 404 /www/error/404.html;
    error_page 500 /www/error/500.html;

    location / {
        root www;
        index index.html;
        methods GET POST;
        autoindex on;
    }

    location /uploads {
        root www/uploads;
        methods GET POST DELETE;
        upload_dir www/uploads;
    }

    location /cgi-bin {
        root cgi-bin;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}
